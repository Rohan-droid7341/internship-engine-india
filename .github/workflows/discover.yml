name: Discover companies

# Daily: mine public internship datasets for new company/ATS tokens and probe
# the curated candidates, growing data/companies.json on its own. The regular
# update run then starts polling whatever this finds.
on:
  schedule:
    - cron: "30 8 * * *"    # daily 08:30 UTC — off the top-of-hour so it never
                            # contends with the hourly update run's push
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: discover-companies
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover + harvest
        run: |
          python run.py discover
          python run.py harvest

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/companies.json
          if git diff --staged --quiet; then
            echo "No new companies."
          else
            git commit -m "chore: discover new companies ($(date -u +'%Y-%m-%d'))"
            # The hourly update workflow may push at the same time; rebase onto
            # it (different file, auto-merges) and retry rather than fail.
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push race, retrying ($attempt)…"; sleep 5
            done
          fi
